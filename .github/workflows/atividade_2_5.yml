# .github/workflows/atividade_2_4.yml
name: Quarto Workflow

on:
  push:

jobs:
  primeiro-job:
    name: Job 1
    runs-on: ubuntu-latest
    steps:
      - run: echo "Primeiro passo"
      - name: Checkout
        uses: actions/checkout@v5

      - name: Mostra data e hora
        run: date

      - name: Versão do git
        run: git --version

  validar-arquivos:
    name: Job 2
    needs: primeiro-job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar README.md
        run: |
          if [-f README.md]; then
            echo "Arquivo README.md encontrado."
          else
            echo "Arquivo README.md não encontrado."
            exit 1
          fi

      - name: Validar LICENSE
        run: |
          if [-f LICENSE]; then
            echo "Arquivo LICENSE encontrado."
          else
            echo "Arquivo LICENSE não encontrado."
            exit 1
          fi
          
      - name: Validar .gitignore
        run: |
          if [-f .gitignore]; then
            echo "Arquivo .gitignore encontrado."
          else
            echo "Arquivo .gitignore não encontrado."
            exit 1
          fi