name: Quinto Workflow

on:
  push:

jobs:
  quinto-job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Quinto passo"
      - name: Checkout
        uses: actions/checkout@v5
      - name: Data e hora da execução
        run: date
      - name: Versão do Git
        run: git --version
        
  sexto-job:
    needs: quinto-job
    runs-on: ubuntu-latest
    steps:
      - run: echo "Sexto passo"
      - name: Checkout
        uses: actions/checkout@v5
      - name: Verifica README.md
        run: |
          if [ ! -f README.md ]; then
            echo "ERRO: README.md não encontrado!"
            exit 1
          fi
          echo "README.md OK"

      - name: Verifica LICENSE
        run: |
          if [ ! -f LICENSE ]; then
            echo "ERRO: LICENSE não encontrado!"
            exit 1
          fi
          echo "LICENSE OK"

      - name: Verifica .gitignore
        run: |
          if [ ! -f .gitignore ]; then
            echo "ERRO: .gitignore não encontrado!"
            exit 1
          fi
          echo ".gitignore OK"
      
    